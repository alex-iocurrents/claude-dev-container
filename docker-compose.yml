services:
  dev:
    build:
      context: .
      args:
        HOST_UID: ${HOST_UID:-501}
        HOST_GID: ${HOST_GID:-20}
    image: claude-dev:latest
    container_name: claude-dev
    stdin_open: true
    tty: true

    environment:
      - TERM=xterm-256color

    volumes:
      - ${HOME}/git:/workspace:rw
      - ${HOME}/.claude:/home/devuser/.claude:rw
      - ${HOME}/.claude.json:/home/devuser/.claude.json:rw

    network_mode: bridge

    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID

    security_opt:
      - no-new-privileges:true

    working_dir: /workspace
